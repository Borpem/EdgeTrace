      <stop stop-color="#101D25"/>
      <stop offset=".55" stop-color="#081118"/>
      <stop offset="1" stop-color="#050A0E"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 110) rotate(36) scale(420 270)">
