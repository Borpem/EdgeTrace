<svg width="1100" height="560" viewBox="0 0 1100 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#101D25"/><stop offset="1" stop-color="#050A0E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 210) rotate(120) scale(440 320)">
      <stop stop-color="#72D89A" stop-opacity=".16"/><stop offset="1" stop-color="#72D89A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#4EC4EC" stroke-opacity=".045"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect width="1100" height="560" fill="#020609"/>
  <rect width="1100" height="560" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <rect x="40" y="42" width="1020" height="476" fill="url(#panel)" stroke="#294757"/>
    <rect x="40" y="42" width="1020" height="476" fill="url(#grid)"/>
    <text x="78" y="100" fill="#B7E8F8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="7">DRIVER MAP</text>
    <text x="78" y="142" fill="#F6FAFC" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="760" letter-spacing="-1.8">Separate the drag from the edge.</text>

    <g>
      <rect x="78" y="196" width="294" height="226" fill="#071017" stroke="#F05E77" stroke-opacity=".65"/>
      <path d="M78 196V422" stroke="#F05E77" stroke-width="4"/>
      <text x="108" y="244" fill="#F05E77" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="4">NEGATIVE DRIVERS</text>
      <text x="108" y="304" fill="#F05E77" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="780" letter-spacing="-2">-$1.1k</text>
      <text x="108" y="340" fill="#D7E8F0" font-family="Inter, Arial, sans-serif" font-size="19">Cost drag</text>
      <text x="108" y="386" fill="#F05E77" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="760">META leak</text>
    </g>

    <g>
      <rect x="404" y="196" width="292" height="226" fill="#071017" stroke="#E8BE4C" stroke-opacity=".65"/>
      <path d="M404 196V422" stroke="#E8BE4C" stroke-width="4"/>
      <text x="434" y="244" fill="#E8BE4C" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="4">WATCHLIST</text>
      <text x="434" y="304" fill="#E8BE4C" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="780" letter-spacing="-2">46.4%</text>
      <text x="434" y="340" fill="#D7E8F0" font-family="Inter, Arial, sans-serif" font-size="19">Win rate near threshold</text>
      <path d="M434 374H640" stroke="#284657" stroke-width="8"/>
      <path d="M434 374H535" stroke="#E8BE4C" stroke-width="8"/>
    </g>

    <g>
      <rect x="728" y="196" width="294" height="226" fill="#071017" stroke="#72D89A" stroke-opacity=".65"/>
      <path d="M728 196V422" stroke="#72D89A" stroke-width="4"/>
      <text x="758" y="244" fill="#72D89A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="4">POSITIVE DRIVERS</text>
      <text x="758" y="304" fill="#72D89A" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="780" letter-spacing="-2">$209</text>
      <text x="758" y="340" fill="#D7E8F0" font-family="Inter, Arial, sans-serif" font-size="19">Average winning trade</text>
      <text x="758" y="386" fill="#72D89A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="760">TSLA strength</text>
    </g>
