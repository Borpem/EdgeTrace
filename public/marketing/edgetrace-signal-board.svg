      <stop offset=".55" stop-color="#E8BE4C" stop-opacity=".05"/>
      <stop offset="1" stop-color="#E8BE4C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#101D25"/>
      <stop offset=".46" stop-color="#081118"/>
      <stop offset="1" stop-color="#050A0E"/>
