<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">EdgeTrace recommended actions graphic</title>
<desc id="desc">A polished EdgeTrace style graphic showing prioritized recommended actions and action priority.</desc>
<defs>
  <linearGradient id="frameBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1b24"/><stop offset="0.58" stop-color="#071117"/><stop offset="1" stop-color="#05090d"/></linearGradient>
  <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d2029" stop-opacity="0.96"/><stop offset="0.72" stop-color="#07131a" stop-opacity="0.98"/><stop offset="1" stop-color="#050b10" stop-opacity="0.99"/></linearGradient>
  <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1c25"/><stop offset="1" stop-color="#061017"/></linearGradient>
  <linearGradient id="cardBgActive" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d2430"/><stop offset="1" stop-color="#06131b"/></linearGradient>
  <linearGradient id="chipBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1a23"/><stop offset="1" stop-color="#061018"/></linearGradient>
  <linearGradient id="goldFill" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#e7bd49" stop-opacity="0.26"/><stop offset="1" stop-color="#e7bd49" stop-opacity="0"/></linearGradient>
  <linearGradient id="redFill" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff5d84" stop-opacity="0.22"/><stop offset="1" stop-color="#ff5d84" stop-opacity="0"/></linearGradient>
  <linearGradient id="greenFill" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6de99d" stop-opacity="0.22"/><stop offset="1" stop-color="#6de99d" stop-opacity="0"/></linearGradient>
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#57c9ed" stop-opacity="0.15"/><stop offset="1" stop-color="#57c9ed" stop-opacity="0"/></radialGradient>
  <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0 L0 0 0 36" fill="none" stroke="#1b3948" stroke-width="1" opacity="0.18"/></pattern>
  <clipPath id="frameClip"><rect x="42" y="34" width="1116" height="640" rx="14"/></clipPath>
  <filter id="outerShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.50"/></filter>
  <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.32"/></filter>
  <filter id="blurGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="46"/></filter>
  <style>
    .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
    .kicker { font-size: 12px; font-weight: 800; letter-spacing: .22em; fill: #b7ecff; }
    .smallKicker { font-size: 10px; font-weight: 800; letter-spacing: .18em; fill: #8db9ca; }
  </style>
</defs>
