      <text x="112" y="438" fill="#F6FAFC" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="760">Review overdue</text>
      <text x="112" y="476" fill="#D7E8F0" font-family="Inter, Arial, sans-serif" font-size="19">Import after the next 2-3 sessions. Verify expectancy, META downside, and profit factor.</text>
