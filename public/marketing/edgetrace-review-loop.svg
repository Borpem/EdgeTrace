      <text x="428" y="306" fill="#4EC4EC" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="780">59th</text>
      <text x="557" y="306" fill="#D7E8F0" font-family="Inter, Arial, sans-serif" font-size="18">percentile</text>
    </g>
